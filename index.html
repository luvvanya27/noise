<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Noise & Form</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #000;
    color: #fff;
  }

  header {
    width: 100%;
    padding: 20px 0;
    background: #000;
    border-bottom: 1px solid #222;
    position: fixed;
    top: 0;
    left: 0;
    z-index: 10;
  }

  .header-inner {
    width: 90%;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .logo {
    font-size: 20px;
    font-weight: bold;
    color: #00e5d4;
  }

  nav a {
    margin-left: 20px;
    color: #ccc;
    text-decoration: none;
    font-size: 15px;
  }

  nav a:hover {
    color: #9b4dff;
  }

  .hero {
    width: 100%;
    min-height: 100vh;
    padding-top: 120px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
  }

  .hero h1 {
    font-size: 48px;
    margin-bottom: 10px;
  }

  .hero p {
    font-size: 18px;
    color: #bbb;
    margin-bottom: 30px;
  }

  .hero button {
    padding: 12px 24px;
    background: #9b4dff;
    border: none;
    color: #fff;
    border-radius: 6px;
    cursor: pointer;
    transition: transform .2s;
  }

  .hero button:hover {
    transform: translateY(-3px);
  }

  @media (max-width: 600px) {
    nav { display: none; }
    .hero h1 { font-size: 32px; }
    .hero p { font-size: 16px; }
  }
</style>
</head>

<body>

<header>
  <div class="header-inner">
    <div class="logo">NOISE & FORM</div>
    <nav>
      <a href="#products">Товары</a>
      <a href="#about">О нас</a>
      <a href="#contact">Контакты</a>
    </nav>
  </div>
</header>

<section class="hero">
  <h1>Где шум становится формой</h1>
  <p>Минималистичные дизайнерские объекты, вдохновлённые текстурой и тишиной.</p>
  <button>Смотреть коллекцию</button>
</section>

</body>
</html>
